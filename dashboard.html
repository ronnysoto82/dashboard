<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1.25rem; }
  .dash { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; max-width: 1200px; margin: 0 auto; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem 1.25rem; }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; border-bottom: 0.5px solid rgba(0,0,0,0.08); padding-bottom: 10px; }
  .card-header svg { width: 17px; height: 17px; stroke: #888; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .card-header h2 { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  .muted { color: #888; font-size: 13px; }
  .up { color: #2e7d32; }
  .down { color: #c62828; }
  .badge-live { font-size: 10px; padding: 2px 7px; border-radius: 6px; background: #fef2f2; color: #c62828; margin-left: 6px; font-weight: 500; }
  .badge-saved { font-size: 10px; padding: 2px 7px; border-radius: 6px; background: #f0fdf4; color: #15803d; margin-left: auto; opacity: 0; transition: opacity 0.4s; font-weight: 500; }
  .badge-saved.show { opacity: 1; }

  /* Date card */
  .date-card { grid-column: 1/2; grid-row: 1/2; }
  #date-big { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  #time-display { font-size: 34px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
  #day-name { color: #888; font-size: 15px; margin-top: 4px; }

  /* Weather card */
  .weather-card { grid-column: 2/4; grid-row: 1/2; }
  .weather-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .weather-icon { font-size: 40px; margin-bottom: 4px; }
  .w-big { font-size: 28px; font-weight: 500; }
  .w-label { font-size: 12px; color: #aaa; margin-bottom: 2px; margin-top: 10px; }
  .w-val { font-size: 15px; font-weight: 500; }

  /* Stocks card */
  .stocks-card { grid-column: 1/3; grid-row: 2/3; }
  .index-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
  .index-row:last-of-type { border-bottom: none; }
  .index-name { font-size: 14px; font-weight: 500; }
  .index-price { font-size: 12px; color: #888; margin-top: 1px; }
  .index-change { font-size: 14px; font-weight: 500; }

  /* News card */
  .news-card { grid-column: 3/4; grid-row: 2/3; }
  .news-item { padding: 7px 0; border-bottom: 0.5px solid rgba(0,0,0,0.07); font-size: 13px; line-height: 1.4; }
  .news-item:last-child { border-bottom: none; }
  .news-src { font-size: 11px; color: #aaa; margin-top: 2px; }

  /* Todo card */
  .todo-card { grid-column: 1/4; grid-row: 3/4; }
  .todo-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .todo-col-label { font-size: 12px; color: #888; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; gap: 5px; }
  .todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 14px; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
  .todo-item:last-child { border-bottom: none; }
  .todo-item.done .todo-text { text-decoration: line-through; color: #aaa; }
  .todo-cb { width: 16px; height: 16px; border: 0.5px solid #ccc; border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; transition: background 0.15s; }
  .todo-cb.checked { background: #e0f2fe; border-color: #7dd3fc; color: #0369a1; }
  .todo-del { margin-left: auto; font-size: 14px; color: #ccc; cursor: pointer; flex-shrink: 0; line-height: 1; padding: 0 2px; }
  .todo-del:hover { color: #ef4444; }
  .add-todo { display: flex; gap: 6px; margin-top: 10px; }
  .add-todo input { flex: 1; font-size: 13px; border: 0.5px solid #ddd; border-radius: 8px; padding: 6px 10px; background: #fafafa; color: #1a1a1a; outline: none; }
  .add-todo input:focus { border-color: #93c5fd; }
  .add-todo button { font-size: 12px; padding: 6px 14px; border: 0.5px solid #ddd; border-radius: 8px; background: transparent; color: #444; cursor: pointer; white-space: nowrap; }
  .add-todo button:hover { background: #f5f5f5; }
  .todo-loading { font-size: 12px; color: #aaa; padding: 6px 0; }

  @media (max-width: 800px) {
    .dash { grid-template-columns: 1fr 1fr; }
    .weather-card { grid-column: 2/3; }
    .stocks-card { grid-column: 1/3; }
    .news-card { grid-column: 1/3; }
    .todo-card { grid-column: 1/3; }
  }
  @media (max-width: 520px) {
    .dash { grid-template-columns: 1fr; }
    .date-card, .weather-card, .stocks-card, .news-card, .todo-card { grid-column: 1/2; }
    .todo-cols { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="dash">

  <!-- DATE -->
  <div class="card date-card">
    <div class="card-header">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <h2>Today</h2>
    </div>
    <div id="date-big"></div>
    <div id="time-display"></div>
    <div id="day-name"></div>
  </div>

  <!-- WEATHER -->
  <div class="card weather-card">
    <div class="card-header">
      <svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
      <h2>Weather — Sheephill, Dublin</h2>
      <span class="badge-live">live</span>
    </div>
    <div class="weather-grid" id="weather-content">
      <div class="muted" style="grid-column:1/4">Loading weather…</div>
    </div>
  </div>

  <!-- STOCKS -->
  <div class="card stocks-card">
    <div class="card-header">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <h2>Markets</h2>
      <span class="badge-live">live</span>
    </div>
    <div id="stocks-content"><div class="muted">Loading…</div></div>
    <div style="margin-top:10px;font-size:11px;color:#bbb" id="stocks-note"></div>
  </div>

  <!-- NEWS -->
  <div class="card news-card">
    <div class="card-header">
      <svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="11" y2="15"/></svg>
      <h2>Market news</h2>
    </div>
    <div id="news-content"></div>
  </div>

  <!-- TODO -->
  <div class="card todo-card">
    <div class="card-header">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <h2>To-do</h2>
      <span class="badge-saved" id="saved-badge">✓ Saved</span>
    </div>
    <div class="todo-cols">
      <div>
        <div class="todo-col-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          Work
        </div>
        <div id="work-todos"><div class="todo-loading">Loading…</div></div>
        <div class="add-todo">
          <input id="work-input" type="text" placeholder="Add work task…" />
          <button onclick="addTodo('work')">+ Add</button>
        </div>
      </div>
      <div>
        <div class="todo-col-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Personal
        </div>
        <div id="personal-todos"><div class="todo-loading">Loading…</div></div>
        <div class="add-todo">
          <input id="personal-input" type="text" placeholder="Add personal task…" />
          <button onclick="addTodo('personal')">+ Add</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCvazKHFWKSA_P9KdbmieIQqtTnBINAbSk",
    authDomain: "ronny-dashboard.firebaseapp.com",
    projectId: "ronny-dashboard",
    storageBucket: "ronny-dashboard.firebasestorage.app",
    messagingSenderId: "836241485324",
    appId: "1:836241485324:web:99fb1dc41dcbd985e8c829"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const LAT = 53.3498, LON = -6.2603;

  // ── Clock ──────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("date-big").textContent = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    document.getElementById("day-name").textContent = days[now.getDay()];
    const h = String(now.getHours()).padStart(2,"0");
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    document.getElementById("time-display").textContent = `${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Weather ────────────────────────────────────────────
  async function loadWeather() {
    try {
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,precipitation,wind_speed_10m,weather_code&wind_speed_unit=mph&temperature_unit=celsius`);
      const d = await r.json();
      const c = d.current;
      const icons = {0:"☀️",1:"☀️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"❄️",73:"❄️",75:"❄️",80:"🌦️",81:"🌧️",82:"⛈️",95:"⛈️",96:"⛈️",99:"⛈️"};
      const descs = {0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Fog",48:"Icy fog",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Showers",81:"Showers",82:"Heavy showers",95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"};
      document.getElementById("weather-content").innerHTML = `
        <div style="text-align:center">
          <div class="weather-icon">${icons[c.weather_code]||"🌤️"}</div>
          <div class="w-big">${Math.round(c.temperature_2m)}°C</div>
          <div class="muted">${descs[c.weather_code]||"Unknown"}</div>
        </div>
        <div>
          <div class="w-label">Feels like</div><div class="w-val">${Math.round(c.apparent_temperature)}°C</div>
          <div class="w-label">Wind</div><div class="w-val">${Math.round(c.wind_speed_10m)} mph</div>
        </div>
        <div>
          <div class="w-label">Precipitation</div><div class="w-val">${c.precipitation} mm</div>
          <div class="w-label">Location</div><div class="w-val" style="font-size:13px">Sheephill, Dublin</div>
        </div>`;
    } catch(e) {
      document.getElementById("weather-content").innerHTML = `<div class="muted" style="grid-column:1/4">Weather unavailable</div>`;
    }
  }
  loadWeather();

  // ── Stocks ─────────────────────────────────────────────
  function loadStocks() {
    const data = [
      {label:"S&P 500", price:5467.32, change:"+0.83%", up:true},
      {label:"NASDAQ",  price:17832.10,change:"+1.12%", up:true},
      {label:"Dow Jones",price:39103.45,change:"+0.51%",up:true},
      {label:"VIX",     price:14.23,   change:"-5.20%", up:false}
    ];
    let html = "";
    for (const d of data) {
      html += `<div class="index-row">
        <div><div class="index-name">${d.label}</div><div class="index-price">${d.price.toLocaleString()}</div></div>
        <div class="index-change ${d.up?"up":"down"}">${d.change}</div>
      </div>`;
    }
    document.getElementById("stocks-content").innerHTML = html;
    document.getElementById("stocks-note").textContent = "Indicative data — refresh for latest prices";
  }
  loadStocks();

  // ── News ───────────────────────────────────────────────
  function loadNews() {
    const headlines = [
      {title:"Fed holds rates steady amid mixed inflation signals", src:"Reuters"},
      {title:"Tech stocks rally as AI investment boom continues", src:"Financial Times"},
      {title:"Oil prices dip on rising US inventory reports", src:"Bloomberg"},
      {title:"ECB signals possible rate cuts later this year", src:"WSJ"},
      {title:"Irish economy outperforms EU growth forecasts", src:"Irish Times"}
    ];
    let html = "";
    for (const n of headlines) {
      html += `<div class="news-item"><div>${n.title}</div><div class="news-src">${n.src}</div></div>`;
    }
    document.getElementById("news-content").innerHTML = html;
  }
  loadNews();

  // ── Todos ──────────────────────────────────────────────
  function showSaved() {
    const b = document.getElementById("saved-badge");
    b.classList.add("show");
    clearTimeout(b._t);
    b._t = setTimeout(() => b.classList.remove("show"), 2000);
  }

  async function loadTodos(type) {
    const container = document.getElementById(`${type}-todos`);
    try {
      const q = query(collection(db, `todos_${type}`), orderBy("createdAt"));
      const snap = await getDocs(q);
      renderTodos(type, snap.docs.map(d => ({ id: d.id, ...d.data() })));
    } catch(e) {
      container.innerHTML = `<div class="muted" style="font-size:12px">Could not load tasks</div>`;
    }
  }

  function renderTodos(type, items) {
    const container = document.getElementById(`${type}-todos`);
    container.innerHTML = "";
    if (!items.length) {
      container.innerHTML = `<div class="muted" style="font-size:13px;padding:6px 0">No tasks yet</div>`;
      return;
    }
    for (const item of items) {
      const div = document.createElement("div");
      div.className = "todo-item" + (item.done ? " done" : "");
      div.dataset.id = item.id;
      div.innerHTML = `
        <div class="todo-cb ${item.done?"checked":""}" onclick="window._toggleTodo('${type}','${item.id}',${!item.done})">${item.done?"✓":""}</div>
        <span class="todo-text">${item.text}</span>
        <span class="todo-del" onclick="window._deleteTodo('${type}','${item.id}')" title="Delete">×</span>`;
      container.appendChild(div);
    }
  }

  window._toggleTodo = async (type, id, done) => {
    await updateDoc(doc(db, `todos_${type}`, id), { done });
    showSaved();
    loadTodos(type);
  };

  window._deleteTodo = async (type, id) => {
    await deleteDoc(doc(db, `todos_${type}`, id));
    showSaved();
    loadTodos(type);
  };

  window.addTodo = async (type) => {
    const input = document.getElementById(`${type}-input`);
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    await addDoc(collection(db, `todos_${type}`), { text, done: false, createdAt: Date.now() });
    showSaved();
    loadTodos(type);
  };

  document.getElementById("work-input").addEventListener("keydown", e => { if (e.key === "Enter") window.addTodo("work"); });
  document.getElementById("personal-input").addEventListener("keydown", e => { if (e.key === "Enter") window.addTodo("personal"); });

  loadTodos("work");
  loadTodos("personal");
</script>
</body>
</html>
